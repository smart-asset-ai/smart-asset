<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Robot body/head outline (matching AIMascot SVG) -->
  <rect x="44" y="82" width="112" height="82" rx="22" ry="22" fill="none" stroke="white" stroke-width="7"/>
  <!-- Antenna triangle top-right -->
  <polygon points="130,82 158,52 156,82" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
  <!-- AI text -->
  <text x="100" y="133" text-anchor="middle" dominant-baseline="middle"
    fill="white" font-size="42" font-weight="900"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif" letter-spacing="4">AI</text>
</svg>
